<div class="p-8 space-y-6 h-full overflow-y-auto bg-background">
  <div class="flex items-center justify-between border-b border-outline-variant pb-4">
    <div>
      <h2 data-i18n="WORKSPACES_TITLE" class="font-headline-lg text-headline-lg font-bold text-on-background">Workspaces</h2>
      <p data-i18n="WORKSPACES_DESC" class="text-on-surface-variant text-body-md mt-1">Manage and select your local development folders mapped to Antigravity CLI projects.</p>
    </div>
    <button id="add-workspace-btn" class="px-4 py-2 bg-primary text-on-primary font-medium rounded hover:opacity-90 transition-opacity flex items-center gap-2 font-label-sm text-label-sm shadow-sm">
      <span class="material-symbols-outlined text-[18px]">add_circle</span>
      <span data-i18n="ADD_DIRECTORY">Add Directory</span>
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="workspace-cards">
    <!-- Workspaces list populated here -->
    <div class="col-span-2 text-center py-12 border border-dashed border-outline rounded-lg bg-surface-container/20">
      <span class="material-symbols-outlined text-outline text-[40px] mb-2">folder_open</span>
      <p data-i18n="NO_WORKSPACES_FOUND" class="text-on-surface-variant text-body-md">No workspaces found. Click "Add Directory" to register a folder.</p>
    </div>
  </div>
</div>
