<div class="p-8 space-y-6 h-full overflow-y-auto bg-background">
  <div class="border-b border-outline-variant pb-4">
    <h2 class="font-headline-lg text-headline-lg font-bold text-on-background">Tools & Plugins</h2>
    <p class="text-on-surface-variant text-body-md mt-1">Configure external plugin packages, custom commands, and MCP server transports.</p>
  </div>

  <!-- Plugins List Card -->
  <div class="bg-surface-container rounded-lg border border-outline-variant p-6 space-y-4">
    <h3 class="font-headline-md font-bold text-primary" style="font-size: 16px;">Installed Plugin Packages</h3>
    
    <div class="divide-y divide-outline-variant/40" id="plugins-list">
      <div class="text-center py-8 text-on-surface-variant text-label-sm">Loading installed plugins...</div>
    </div>
  </div>

  <!-- Install Plugin Section -->
  <div class="bg-surface-container rounded-lg border border-outline-variant p-6 space-y-4">
    <h3 class="font-headline-md font-bold text-on-background" style="font-size: 16px;">Install Custom Plugin / Skill Extension</h3>
    <p class="text-on-surface-variant text-body-md">Provide the repository URL or package name to fetch and configure the extension.</p>
    
    <div class="flex gap-3">
      <input type="text" id="plugin-install-name" class="flex-1 bg-surface-container-lowest border border-outline-variant rounded p-2 focus:ring-1 focus:ring-primary text-body-md text-on-background" placeholder="e.g. https://github.com/gemini-cli-extensions/stitch"/>
      <button id="plugin-install-btn" class="px-6 py-2 bg-primary text-on-primary font-medium rounded hover:opacity-90 transition-opacity font-label-sm text-label-sm shrink-0">Install Extension</button>
    </div>
    
    <div id="plugin-install-status" class="font-code-sm text-code-sm text-on-surface-variant max-h-40 overflow-y-auto p-3 bg-surface-container-lowest rounded hidden">
      <!-- Live install output logs -->
    </div>
  </div>
</div>
